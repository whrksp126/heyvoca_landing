server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Google OAuth 호환 URL (언더스코어 표기) → 빌드 산출물(하이픈 표기)로 매핑
    location = /privacy_policy.html {
        try_files /privacy-policy.html =404;
    }
    location = /terms_of_service.html {
        try_files /terms-of-service.html =404;
    }

    # 정적 자산 캐시
    location ~* \.(?:js|css|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # robots.txt, sitemap.xml 명시적 처리
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap-index.xml { try_files $uri =404; }

    # 정적 HTML 라우팅 (Astro `format: 'file'` → /privacy-policy.html 형태로 출력)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 보안 헤더 (Cloudflare 뒤이지만 다중 방어)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
